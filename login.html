<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CorreAI</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body class="corpo-login">
    <main class="container-login">
        <a href="index.html">
            <img src="img/logo.png" alt="Logo CorreAI" class="logo-login">
        </a>
        
        <form class="formulario-login">
            <h2>Bem-vindo de volta</h2>
            <p>Acesse sua conta para ver seus planos de treino.</p>

            <div class="campo-input">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>

            <div class="campo-input">
                <label for="senha">Senha</label>
                <input type="password" id="senha" placeholder="••••••••" required>
            </div>

            <button type="submit" class="iniciar-plano">Entrar</button>
            
            <p class="link-cadastro">Ainda não tem conta? <a href="#">Cadastre-se</a></p>
        </form>
    </main>
</body>
</html>
