<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CorreAI</title>
    <link rel="stylesheet" href="style/style.css">
</head>
<body class="corpo-login">
    <main class="container-login">
        <a href="index.html">
            <img src="img/logo.png" alt="Logo CorreAI" class="logo-login">
        </a>
        
        <form class="formulario-login">
            <h2>Bem-vindo de volta</h2>
            <p>Acesse sua conta para ver seus planos de treino.</p>

            <div class="campo-input">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="seu@email.com" required>
            </div>

            <div class="campo-input">
                <label for="senha">Senha</label>
                <div class="campo-senha-wrapper">
                    <input type="password" id="senha" placeholder="••••••••" required>
                    <button type="button" class="btn-mostrar-senha" onclick="toggleSenha('senha')">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                    </button>
                </div>
                <a href="#" class="esqueci-senha">Esqueci a senha</a>
            </div>

            <button type="submit" class="iniciar-plano">Entrar</button>
            
            <p class="link-cadastro">Ainda não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
        </form>
    </main>

    <script src="js/script.js"></script>
</body>
</html>
